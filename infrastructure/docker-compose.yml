services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: marketing-seo-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
      POSTGRES_DB: ${POSTGRES_DB:-marketing_seo}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - marketing-seo-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-marketing_seo}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis
  redis:
    image: redis:7-alpine
    container_name: marketing-seo-redis
    volumes:
      - redis_data:/data
    networks:
      - marketing-seo-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend Gateway (Express)
  gateway:
    build:
      context: ../backend-gateway
      dockerfile: Dockerfile
    container_name: marketing-seo-gateway
    environment:
      PORT: 4000
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET:-your-secret-key}
      FASTAPI_BASE_URL: http://backend-data:8000
      DATABASE_URL: postgresql://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-app}@postgres:5432/${POSTGRES_DB:-marketing_seo}
      REDIS_URL: redis://redis:6379
    ports:
      - "127.0.0.1:4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend-data:
        condition: service_started
    networks:
      - marketing-seo-network
    restart: unless-stopped

  # Backend Datos (FastAPI)
  backend-data:
    build:
      context: ../backend-data
      dockerfile: Dockerfile
    container_name: marketing-seo-backend-data
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-app}@postgres:5432/${POSTGRES_DB:-marketing_seo}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-in-production}
      # Base del front (Next): OAuth usa FRONTEND_URL/oauth/callback; en local con localhost ignora redirect en BD para Google/Meta/TikTok
      # Usar "localhost" (no 127.0.0.1): Google OAuth exige coincidencia exacta con la consola
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      META_ACCESS_TOKEN: ${META_ACCESS_TOKEN:-}
      LINKEDIN_CLIENT_ID: ${LINKEDIN_CLIENT_ID:-}
      LINKEDIN_CLIENT_SECRET: ${LINKEDIN_CLIENT_SECRET:-}
      TIKTOK_CLIENT_ID: ${TIKTOK_CLIENT_ID:-}
      TIKTOK_CLIENT_SECRET: ${TIKTOK_CLIENT_SECRET:-}
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - marketing-seo-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  marketing-seo-network:
    driver: bridge

